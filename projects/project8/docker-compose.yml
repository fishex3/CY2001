services:
  dashboard:
    build: .
    image: project8-sector-spillovers:latest
    ports:
      - "8501:8501"
    environment:
      # Optional: override if Rscript is not on PATH (default in image is fine)
      # RSCRIPT: /usr/bin/Rscript
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
